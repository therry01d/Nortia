name: Build APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HAS_RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Dar permiso de ejecución a gradlew
        run: chmod +x gradlew

      - name: Compilar APK de debug
        run: ./gradlew assembleDebug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nortia-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Decodificar keystore de release
        if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "${{ github.workspace }}/release.keystore"

      - name: Compilar APK de release firmado
        if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Subir APK de release como artefacto
        if: ${{ env.HAS_RELEASE_KEYSTORE == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: nortia-release-apk
          path: app/build/outputs/apk/release/*.apk
